name: Build and Push Docker Image

on:
  push:
    branches:
      - github-action

env:
  AWS_REGION: ap-northeast-1
  AWS_ECR_REPOSITORY: deposit-withdraw-monitor
  AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR repository URL
        id: ecr-url
        run: |
          ECR_URL=$(aws ecr describe-repositories --repository-names ${{ env.AWS_ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} --query 'repositories[0].repositoryUri' --output text)
          echo "ECR_URL=$ECR_URL" >> $GITHUB_OUTPUT
          echo "✅ ECR Repository URL: $ECR_URL"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          IMAGE_TAG="v${TIMESTAMP}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "📋 Generated tags: latest, $IMAGE_TAG"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-url.outputs.ECR_URL }}:latest
            ${{ steps.ecr-url.outputs.ECR_URL }}:${{ steps.meta.outputs.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print summary
        run: |
          echo "📋 Image URL: ${{ steps.ecr-url.outputs.ECR_URL }}:latest"
          echo "📋 Tagged version: ${{ steps.ecr-url.outputs.ECR_URL }}:${{ steps.meta.outputs.IMAGE_TAG }}"
          echo "✅ Build and push completed successfully!"
