name: PR checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  prettier:
    name: Prettier format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Use local devDep if you add it; otherwise npx will fetch @latest
      - name: Prettier check
        run: npx prettier --check .

  guardrails:
    name: Guardrails (no .only / pauses / console.log)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block focused tests
        run: |
          ! git grep -nE '\b(it|describe|test)\.only\b|\b(fit|fdescribe)\b' -- '**/*.{ts,tsx,js}' || \
          (echo "Remove focused tests (.only/fit)"; exit 1)
      - name: Block Playwright pauses & debugger
        run: |
          ! git grep -nE '\bpage\.pause\(|\bdebugger;' -- '**/*.{ts,tsx,js}' || \
          (echo "Remove page.pause()/debugger"; exit 1)
      - name: Enforce logger (no console.log outside tests & logger utils)
        run: |
          ! git grep -nE '\bconsole\.log\b' -- \
            ':!**/*.spec.*' ':!**/*test.*' \
            ':!src/utils/logger/**' \
          || (echo "Use the logger instead of console.log (tests & src/utils/logger are allowed)"; exit 1)

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsc -p tsconfig.json --noEmit

  terraform:
    name: Terraform fmt and validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive
      - name: Terraform init (no backend)
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate
