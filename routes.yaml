# Scheduling Configuration
#
# Each route can have multiple schedules defined with EventBridge cron expressions.
# Multiple schedules for the same route are prevented from running concurrently via DynamoDB locking.
#
# EventBridge Cron Format: "Minutes Hours Day-of-month Month Day-of-week Year"
# - Use `?` for either day-of-month or day-of-week (one must be `?`)
# - Use `*` for "any value"
# - Use `/` for step values (e.g., `0/15` = every 15 minutes)
# - Use `-` for ranges (e.g., `9-17` = 9am to 5pm)
# - Use `,` for lists (e.g., `MON,WED,FRI`)
#
# Examples:
#   - "0/30 * * * ? *"             Every 30 minutes, any day
#   - "0/15 9-17 ? * MON-FRI *"    Every 15 min, 9am-5pm, weekdays
#   - "0 18-23,0-8 ? * MON-FRI *"  Every hour, outside 9am-5pm, weekdays
#   - "0 */2 ? * SAT,SUN *"        Every 2 hours on weekends
#
# Full docs: https://docs.aws.amazon.com/eventbridge/latest/userguide/eb-scheduled-rule-pattern.html

